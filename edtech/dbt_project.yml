name: 'edtech'
version: '1.0.0'
config-version: 2

profile: 'edtech'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  edtech:

    staging:
      +schema: staging
      +materialized: view
      +tags: ['staging']

    intermediate:
      +schema: intermediate
      +materialized: view
      +tags: ['intermediate']

    marts:
      +schema: marts

      dimensions:
        +materialized: table
        +tags: ['dimensions']

      facts:
        +materialized: table
        +tags: ['facts']

 